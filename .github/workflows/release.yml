name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ruby
          bundler-cache: true

      - uses: rubygems/configure-rubygems-credentials@main

      - name: Build gem
        run: gem build rack-strip-cookies.gemspec

      - name: Publish gem
        run: gem push pkg/*.gem
